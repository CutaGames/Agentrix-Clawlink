appId: app.agentrix.claw
---
# Test 02: Auth screen exposes wallet, social, and email entry points.

- launchApp:
    clearState: true
    clearKeychain: true

- waitForAnimationToEnd:
    timeout: 12000

- assertVisible: "Agentrix Claw"
- takeScreenshot: "02-auth-branding"

- assertVisible:
    text: "Connect Crypto Wallet|连接加密钱包|Connect Wallet|连接钱包"

- assertVisible: "Google"

- tapOn:
    text: "Use Email Address instead.*|改用邮箱登录.*"

- waitForAnimationToEnd:
    timeout: 2000

- assertVisible:
    text: "Sign In with Email|邮箱登录"

- assertVisible:
    text: "Email|邮箱|Password|密码"

- takeScreenshot: "02-email-tab"
