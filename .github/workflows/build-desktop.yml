name: Build Desktop (Win/Mac/Linux)

on:
  push:
    branches: [main, 'build*']
    tags:
      - 'desktop-v*'
    paths:
      - 'desktop/**'
      - '.github/workflows/build-desktop.yml'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub release'
        type: boolean
        default: true

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundle_ext: '.exe'
            artifact_name: agentrix-desktop-windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundle_ext: '.dmg'
            artifact_name: agentrix-desktop-macos-arm64
          - platform: macos-13
            target: x86_64-apple-darwin
            bundle_ext: '.dmg'
            artifact_name: agentrix-desktop-macos-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundle_ext: '.AppImage'
            artifact_name: agentrix-desktop-linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Agentrix Desktop ${{ github.ref_name }}'
          releaseBody: |
            Desktop release for Windows, macOS, and Linux.
            See the assets below for your platform.
          releaseDraft: true
          prerelease: false

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/**/*
          retention-days: 7

  deploy-update-server:
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Deploy update manifests
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          echo "Update manifests would be deployed to the update server here."
          echo "Artifacts downloaded to: artifacts/"
          ls -la artifacts/ || true
