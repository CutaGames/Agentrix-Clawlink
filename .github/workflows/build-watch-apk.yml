name: Build Wear OS APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug or release)'
        required: false
        default: 'release'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: write

jobs:
  build-wearos:
    name: 🕐 Build Watch APK
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK packages
        run: |
          ANDROID_SDK_ROOT=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> $GITHUB_ENV
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> $GITHUB_PATH
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> $GITHUB_PATH
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            --sdk_root=${ANDROID_SDK_ROOT} 2>&1 | tail -5

      - name: npm install
        run: npm install --legacy-peer-deps
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Patch expo-image for Kotlin 2.x compatibility
        run: |
          python3 - << 'PYEOF'
          import re, os, sys
          filepath = 'node_modules/expo-image/android/src/main/java/expo/modules/image/okhttp/GlideUrlWrapperLoader.kt'
          if not os.path.exists(filepath):
              print(f"[skip] {filepath} not found")
              sys.exit(0)
          with open(filepath, 'r') as f:
              content = f.read()
          fixed = re.sub(r'originalResponse\.body(?!\!)', 'originalResponse.body!!', content)
          if fixed == content:
              print(f"[ok] Already patched: {filepath}")
          else:
              with open(filepath, 'w') as f:
                  f.write(fixed)
              print(f"[patched] {filepath}")
          PYEOF

      - name: Expo prebuild
        run: npx expo prebuild --platform android --no-install
        env:
          CI: '1'

      - name: Patch build.gradle — watch entry point + ABI filter
        run: |
          python3 - << 'PYEOF'
          import re, os
          filepath = 'android/app/build.gradle'
          with open(filepath) as f:
              content = f.read()

          # 1. Replace entryFile to use index.watch.js
          content = re.sub(
              r'(entryFile\s*=\s*file\().*?\)',
              r'\1"../../index.watch.js")',
              content, count=1
          )
          print('[patched] entryFile → index.watch.js')

          # 2. Add ABI filter if not present
          if 'abiFilters' not in content:
              content = re.sub(
                  r'(defaultConfig\s*\{)',
                  '\\1\n        ndk {\n            abiFilters "arm64-v8a"\n        }',
                  content, count=1
              )
              print('[patched] Added abiFilters arm64-v8a')
          else:
              print('[ok] abiFilters already present')

          with open(filepath, 'w') as f:
              f.write(content)
          PYEOF

      - name: Patch AndroidManifest.xml — add Wear OS declarations
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"

          # Add uses-feature for watch
          sed -i '/<manifest/a\    <uses-feature android:name="android.hardware.type.watch" />' "$MANIFEST"

          # Add standalone watch metadata before </application>
          sed -i '/<\/application>/i\    <meta-data android:name="com.google.android.wearable.standalone" android:value="true" />\n    <uses-library android:name="com.google.android.wearable" android:required="false" />' "$MANIFEST"

          # Add body sensor permissions
          if ! grep -q "android.permission.BODY_SENSORS" "$MANIFEST"; then
            sed -i '/<uses-permission android:name="android.permission.VIBRATE"/a\  <uses-permission android:name="android.permission.BODY_SENSORS" />\n  <uses-permission android:name="android.permission.BODY_SENSORS_BACKGROUND" />\n  <uses-permission android:name="android.permission.ACTIVITY_RECOGNITION" />' "$MANIFEST"
          fi

          echo "[patched] AndroidManifest.xml for Wear OS"

      - name: Grant Gradle execute permission
        run: |
          sed -i 's/\r$//' android/gradlew
          chmod +x android/gradlew

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc || true
          df -h /

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-wearos-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-wearos-

      - name: Build Watch APK
        working-directory: android
        run: |
          BUILD_TYPE="${{ inputs.build_type || 'release' }}"
          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug --no-daemon --parallel --build-cache
          else
            ./gradlew assembleRelease --no-daemon --parallel --build-cache
          fi
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true'

      - name: Stage Watch APK
        run: |
          mkdir -p artifacts
          BUILD_TYPE="${{ inputs.build_type || 'release' }}"
          APK=$(find "android/app/build/outputs/apk/${BUILD_TYPE}" -name '*.apk' | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: No APK found"
            find android/app/build/outputs/ -name '*.apk' || true
            exit 1
          fi
          cp "$APK" "artifacts/AgentrixWatch-build-${{ github.run_number }}.apk"
          echo "APK_PATH=artifacts/AgentrixWatch-build-${{ github.run_number }}.apk" >> $GITHUB_ENV
          ls -lh "$APK"

      - name: Upload Watch APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentrix-watch-apk
          path: artifacts/AgentrixWatch-*.apk
          retention-days: 30

      - name: Upload to download server
        continue-on-error: true
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          if [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "No DEPLOY_SSH_KEY secret, skipping upload"
            exit 0
          fi
          echo "$DEPLOY_SSH_KEY" > /tmp/deploy.pem
          chmod 600 /tmp/deploy.pem
          DEST="/home/ubuntu/Agentrix/frontend/public/downloads"
          OPTS="-o StrictHostKeyChecking=no -i /tmp/deploy.pem"
          scp $OPTS "$APK_PATH" "ubuntu@18.139.157.116:${DEST}/agentrix-watch.apk"
          echo "✅ Watch APK uploaded to server"
          echo "📥 Download: https://www.agentrix.top/downloads/agentrix-watch.apk"

      - name: Build summary
        run: |
          APK_SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "## 🕐 Agentrix Watch APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | ${{ inputs.build_type || 'release' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 Install on Wear OS watch" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "adb connect <watch_ip>:5555" >> $GITHUB_STEP_SUMMARY
          echo "adb install AgentrixWatch-build-${{ github.run_number }}.apk" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
