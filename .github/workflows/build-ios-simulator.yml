name: Build iOS Simulator

# Trigger manually from GitHub Actions UI, or on push to main.
# EAS Cloud builds on Expo's macOS fleet — no Apple Developer account needed
# for simulator builds.
#
# ─── SETUP REQUIRED ────────────────────────────────────────────────────────
# Add ONE secret to your GitHub repo (Settings → Secrets → Actions):
#   EXPO_TOKEN   — generate at https://expo.dev/accounts/[you]/settings/access-tokens
# ────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: write

jobs:
  build-ios-simulator:
    name: 🍎 Build iOS Simulator (.app)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm install
        run: npm install --legacy-peer-deps
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

      - name: Install EAS CLI
        run: npm install -g eas-cli@latest

      # ── Start EAS Cloud build (iOS simulator, preview profile) ──────────
      # This submits the build to Expo's macOS cloud servers.
      # eas.json "preview" profile has ios.simulator = true → no signing needed.
      - name: Start EAS Build — iOS Simulator
        id: start-build
        run: |
          set -euo pipefail
          BUILD_JSON=$(eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --no-wait \
            --json \
            2>/dev/null)
          echo "Raw EAS response: $BUILD_JSON"
          BUILD_ID=$(echo "$BUILD_JSON" | python3 -c "
          import json, sys
          data = json.loads(sys.stdin.read().strip())
          builds = data if isinstance(data, list) else [data]
          print(builds[0]['id'])
          ")
          echo "build-id=$BUILD_ID" >> $GITHUB_OUTPUT
          echo "🚀 EAS build queued — ID: $BUILD_ID"
          echo "View at: https://expo.dev/accounts/$(eas whoami 2>/dev/null || echo '...')/projects/agentrix-claw/builds/$BUILD_ID"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ── Poll EAS API until the build finishes (up to 80 minutes) ───────
      - name: Wait for EAS build to complete
        id: wait-build
        run: |
          set -euo pipefail
          BUILD_ID="${{ steps.start-build.outputs.build-id }}"
          echo "⏳ Polling Build ID: $BUILD_ID"

          for i in $(seq 1 80); do
            sleep 60
            RESPONSE=$(curl -s \
              "https://api.expo.dev/v2/builds/${BUILD_ID}" \
              -H "Authorization: Bearer $EXPO_TOKEN" \
              -H "Accept: application/json")

            STATUS=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.loads(sys.stdin.read())
          print(d.get('data', {}).get('status', 'UNKNOWN'))
            " 2>/dev/null || echo "UNKNOWN")

            echo "  [$i/80] Status: $STATUS"

            if [ "$STATUS" = "FINISHED" ]; then
              BUILD_URL=$(echo "$RESPONSE" | python3 -c "
          import json, sys
          d = json.loads(sys.stdin.read())
          url = d.get('data', {}).get('artifacts', {}).get('buildUrl', '')
          print(url)
              ")
              echo "build-url=$BUILD_URL" >> $GITHUB_OUTPUT
              echo "✅ Build complete → $BUILD_URL"
              exit 0
            elif [ "$STATUS" = "ERRORED" ] || [ "$STATUS" = "CANCELED" ]; then
              echo "❌ Build ended with status: $STATUS"
              echo "$RESPONSE" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('data',{}).get('error',{}))"
              exit 1
            fi
          done
          echo "❌ Timed out after 80 minutes"
          exit 1
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      # ── Download the .tar.gz simulator build from EAS ───────────────────
      - name: Download simulator build
        run: |
          FILENAME="Agentrix-iOS-Simulator-build-${{ github.run_number }}.tar.gz"
          echo "Downloading from: ${{ steps.wait-build.outputs.build-url }}"
          curl -L "${{ steps.wait-build.outputs.build-url }}" -o "$FILENAME"
          ls -lh "$FILENAME"
          echo "filename=$FILENAME" >> $GITHUB_ENV

      # ── Upload to GitHub Releases ────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ios-sim-${{ github.run_number }}
          name: "🍎 iOS Simulator Build #${{ github.run_number }}"
          body: |
            ## Agentrix iOS Simulator Build #${{ github.run_number }}

            | | |
            |---|---|
            | Commit | `${{ github.sha }}` |
            | Branch | `${{ github.ref_name }}` |
            | Profile | `preview` — Simulator only (no Apple Developer account required) |
            | Built by | EAS Cloud (Expo macOS servers) |

            ---

            ### 📲 Install in iOS Simulator (requires macOS + Xcode)

            1. Download **Agentrix-iOS-Simulator-build-${{ github.run_number }}.tar.gz** below
            2. Unzip:
               ```bash
               tar -xzf Agentrix-iOS-Simulator-build-${{ github.run_number }}.tar.gz
               ```
            3. Open iOS Simulator: **Xcode → Open Developer Tool → Simulator**
            4. Drag & drop the `.app` file into the running Simulator window

            > ⚠️ This is a **simulator-only** build. It cannot be installed on a physical iPhone.
            > For real-device builds, an Apple Developer account ($99/yr) is required.
          files: ${{ env.filename }}
          draft: false
          prerelease: true
          fail_on_unmatched_files: false
