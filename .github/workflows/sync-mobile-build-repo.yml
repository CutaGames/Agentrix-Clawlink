name: Sync Mobile Frontend To Public Build Repo

on:
  push:
    branches: [main, master, build*]
    paths:
      - App.tsx
      - app.json
      - babel.config.js
      - eas.json
      - .easignore
      - package.json
      - package-lock.json
      - tsconfig.json
      - .gitignore
      - Agentrix Logo/**
      - assets/**
      - src/**
      - scripts/public-build/mobile_mirror_paths.txt
      - .github/workflows/build-apk.yml
      - .github/workflows/build-ios-simulator.yml
      - .github/public-workflows/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sync-mobile-build-repo-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync mobile app frontend
    runs-on: ubuntu-latest
    env:
      TARGET_REPO: CutaGames/Agentrix-Claw
      TARGET_BRANCH: ${{ github.ref_name }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Mirror mobile frontend into public build repo
        env:
          PUBLIC_BUILD_REPO_PUSH_TOKEN: ${{ secrets.PUBLIC_BUILD_REPO_PUSH_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PUBLIC_BUILD_REPO_PUSH_TOKEN:-}" ]; then
            echo "Missing secret: PUBLIC_BUILD_REPO_PUSH_TOKEN"
            exit 1
          fi

          SOURCE_DIR="$GITHUB_WORKSPACE"
          TARGET_DIR="$RUNNER_TEMP/agentrix-claw"

          git clone "https://x-access-token:${PUBLIC_BUILD_REPO_PUSH_TOKEN}@github.com/${TARGET_REPO}.git" "$TARGET_DIR"
          cd "$TARGET_DIR"

          if git ls-remote --exit-code --heads origin "$TARGET_BRANCH" >/dev/null 2>&1; then
            git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"
          else
            git checkout --orphan "$TARGET_BRANCH"
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          copy_path() {
            local rel="$1"
            if [ -e "$SOURCE_DIR/$rel" ]; then
              if [ -d "$SOURCE_DIR/$rel" ]; then
                mkdir -p "$TARGET_DIR/$rel"
                rsync -a "$SOURCE_DIR/$rel/" "$TARGET_DIR/$rel/"
              else
                mkdir -p "$(dirname "$TARGET_DIR/$rel")"
                rsync -a "$SOURCE_DIR/$rel" "$TARGET_DIR/$rel"
              fi
            fi
          }

          while IFS= read -r rel || [ -n "$rel" ]; do
            if [ -z "$rel" ]; then
              continue
            fi
            copy_path "$rel"
          done < "$SOURCE_DIR/scripts/public-build/mobile_mirror_paths.txt"

          if [ -e "$TARGET_DIR/backend" ] || [ -e "$TARGET_DIR/frontend" ]; then
            echo "Public build mirror must not include backend or web frontend content"
            exit 1
          fi

          copy_path ".github/workflows/build-apk.yml"
          copy_path ".github/workflows/build-ios-simulator.yml"

          mkdir -p "$TARGET_DIR/.github/workflows"
          cp "$SOURCE_DIR/.github/public-workflows/build-apk-trigger.yml" "$TARGET_DIR/.github/workflows/build-apk-trigger.yml"
          cp "$SOURCE_DIR/.github/public-workflows/build-ios-simulator-trigger.yml" "$TARGET_DIR/.github/workflows/build-ios-simulator-trigger.yml"

          git add -A

          if git diff --cached --quiet; then
            echo "No mobile frontend changes to sync"
            exit 0
          fi

          git commit -m "sync mobile frontend from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin "HEAD:${TARGET_BRANCH}"