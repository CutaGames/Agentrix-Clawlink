## 三、底部导航栏优化建议

**现状**：5个Tab —— Agent 🤖 / Market 🛒 / Chat 💬 / Social 🌐 / Me 👤

### 核心问题分析

Chat和Social分开独立作为一个Tab各自占位，导致：
- **认知负担过重**：5个Tab对应5个完全不同的心智模型，新用户不知道Chat和Social有什么区别
- **Chat Tab利用率低**：私聊/群聊功能在当前产品阶段体量小，单独占一个Tab有些浪费
- **Agent Tab内容过密**：Console / Chat / Workflow / Memory / Logs / Accounts / Teams 全挤在一个Tab的Stack里

### 建议方案：合并为4个Tab

```
旧 5Tab：  [Agent]  [Market]  [Chat]  [Social]  [Me]
                               ↕ 合并
新 4Tab：  [Agent]  [Explore]  [Social]  [Me]
```

| 新Tab | 内含内容 | 逻辑 |
|---|---|---|
| 🤖 **Agent** | 同现在（控制台+聊天+工作流等） | 不变 |
| 🛒 **Explore** | Market + 新增技能推荐 Feed | 发现与购买合一 |
| 💬 **Social** | Feed + 群聊 + 私信（合并原Chat+Social） | "社区动态"统一入口 |
| 👤 **Me** | 同现在 | 不变 |

**合并Chat进Social的理由**：在Agentrix的场景里，私聊/群聊本质上是**社区功能的一部分**（都是跟人/Agent互动的社交行为），跟Feed帖子天然属于同一个心智模型——这与WhatsApp把聊天和频道统一、Twitter把推文和私信统一是一样的逻辑。

**Social Tab内部结构**：

```
Social Tab 顶部切换：
  [动态 Feed]  [私信]  [群组]

────────────── 动态Feed ─────────────
发帖入口 + 帖子流（含Fork/Install按钮）

────────────── 私信 ─────────────────
原ChatListScreen的内容

────────────── 群组 ─────────────────
原GroupChatScreen入口列表
```

### 图示对比

**旧方案（5Tab）：**
```
┌──────┬──────┬──────┬──────┬──────┐
│ 🤖   │  🛒  │  💬  │  🌐  │  👤  │
│Agent │Market│ Chat │Social│  Me  │
└──────┴──────┴──────┴──────┴──────┘
  主线    商业   聊天   社区   个人
  很重要  重要  体量小  重要   重要
```

**新方案（4Tab）：**
```
┌──────────┬──────────┬──────────┬──────────┐
│    🤖    │    🛒    │    💬    │    👤    │
│  Agent   │  Explore │  Social  │    Me    │
└──────────┴──────────┴──────────┴──────────┘
  Agent核心  发现&购买  社区&沟通   个人中心
```

4个Tab在iPhone上间距更宽松，触摸区域更大，视觉重心更清晰，也更符合当前用户的**实际使用频率**（Agent >> Market > Social > Me，Chat是Social的子功能）。