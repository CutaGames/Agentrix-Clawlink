## 二、Agent 模块优化文档（Build 55 目标）

### 2.1 钱包生成体验重设计

**现状**：手动、无引导，容易跳过。

**优化方案：Agent账户创建走三步Wizard**

```
Step 1: 配置身份
  名称 / 类型 / 能力范围描述

Step 2: 设置支出限额
  [单笔 $100] [日限 $500] [月限 $2000]
  + 允许币种选择（USDT/ETH/USD）
  + 需要二次确认金额阈值

Step 3: 激活钱包（关键步骤不可跳过）
  ┌─────────────────────────────────┐
  │  🔐 为该 Agent 生成专属钱包     │
  │                                  │
  │  这将创建一个新的 MPC 子钱包，   │
  │  仅由该 Agent 签名，与您的       │
  │  主钱包完全隔离。               │
  │                                  │
  │  [生成钱包 — 约3秒]             │
  └─────────────────────────────────┘
  → 完成后显示地址 + 可选"充值 $10 激活"
```

**代码修改**：在`CreateAgentModal`完成`onCreate()`成功回调后，立即自动触发`openWalletForAgent(result.id)`，而不是等用户在列表里再找到这个按钮。

