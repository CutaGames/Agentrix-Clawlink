## 一、账户与钱包体系架构厘清

### 目前的两层账户体系（是分开的）

```
用户注册
    │
    ▼
AuthUser (用户账户)
  ├── id / agentrixId / email / nickname
  ├── walletAddress  ─────┐  用户自己的个人 MPC 钱包
  ├── roles[]             │  用于：Marketplace购买、佣金收款、充提
  └── openClawInstances[] │  = 连接的 OpenClaw 引擎列表（实例）
                          │
  ▼ 引擎实例下独立维护     ▼
AgentAccount (Agent账户，复数)    /agent-accounts API
  ├── id / agentUniqueId / name
  ├── agentType (personal/commerce/research/automation...)
  ├── status (active/suspended)
  ├── creditScore
  ├── spendingLimits { singleTx / daily / monthly }
  └── walletAddress  ─────── Agent 专属 MPC 钱包（手动创建）
                              用于：Agent 自主支付，受 spendingLimits 约束
```

### 当前钱包生成流程（存在问题）

| 场景 | 触发时机 | 代码路径 | 问题 |
|---|---|---|---|
| 用户个人钱包 | 猜测登录/注册时后端自动创建 | `AuthUser.walletAddress` 填充于登录响应 | 前端没有明确确认时机 |
| Agent专属钱包 | **用户手动点击"Create Wallet"按钮** | `openWalletForAgent()` → `POST /mpc-wallet/create` | ❌ 非自动、需要用户主动操作才能激活Agent支付能力 |
| MPC shard存储 | `clearAuth()`时删除`mpc_shard_a` | `SecureStore.deleteItemAsync('mpc_shard_a')` | 仅能看到shard_a，说明用另一个shard托管在后端 |

**关键缺陷**：AgentAccount创建后，如果用户不主动点击"Open Wallet"，Agent就没有独立支付能力，但界面上并没有明显提示这一步是**必须操作**。

